{% extends 'base.html' %}

{% block title %}Password Reset - House Rental Management System{% endblock %}

{% block content %}
<div class="form-container">
    <h2 class="form-title">Reset Your Password</h2>
    
    <p style="text-align: center; color: #7f8c8d; margin-bottom: 2rem;">
        Enter your email address and we'll send you a link to reset your password.
    </p>
    
    <form method="post">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" class="form-control" required>
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn btn-blue" style="flex: 1;">Send Reset Link</button>
        </div>
        
        <div style="text-align: center; margin-top: 1rem;">
            <p><a href="{% url 'login' %}">Back to Login</a></p>
        </div>
    </form>
</div>
{% endblock %}
